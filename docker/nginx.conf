# 2026-04-05 | 新增 | 容器内 Nginx 配置
# 功能描述：serve 前端静态文件 + 反代 /api 到 FastAPI 后端
# 设计思路：
#   - / 路径 → web/dist 静态文件（SPA fallback 到 index.html）
#   - /api → FastAPI 后端 127.0.0.1:8321
#   - 上传大小限制 50MB（允许大图片上传）
#   - proxy 超时设置 600s（匹配后端预测超时）
# 影响范围：仅容器内 Nginx 行为
# 潜在风险：无已知风险

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # 2026-04-05 | 修复 | 启用 Cross-Origin Isolation（COOP + COEP）
    # Gaussian Splats 3D 库在 Web Worker 中使用 SharedArrayBuffer，
    # 需要 crossOriginIsolated 上下文才能正常工作。
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # 前端静态文件
    root /app/web/dist;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 预测输出文件（.ply）直接 serve
    location /output/ {
        alias /tmp/sharp-output/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    # API 反代到 FastAPI 后端
    location /api/ {
        proxy_pass http://127.0.0.1:8321;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 预测接口耗时较长，设置 10 分钟超时
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 30s;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
